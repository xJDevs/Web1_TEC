<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Battle - Stage 2</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <!-- Evita que el HTML cargue si no hay datos en el local storage -->
  <script>
    if (!localStorage.getItem('playerData') || !localStorage.getItem('opponentData')) {
      window.location.replace('../stage-1/index.html');
    }
  </script>

  <script type="module" src="main.js"></script>
</head>
<body>
  <main class="battle-container">
    <header class="stage-header">
      <h1>STAGE 2: LA ARENA</h1>
      <p class="subtitle">¡A luchar!</p>
    </header>

    <div class="pokemon-arena">
      <!-- Fila del Oponente (Arriba) -->
      <div class="arena-row opponent-row">
        <div class="stats-box" id="opponent-stats">
          <h2 id="opponent-name">--Nombre del Oponente--</h2>
          <div class="hp-bar-container">
            <div id="opponent-hp-bar" class="hp-fill hp-red"></div>
          </div>
          <p class="hp-text"><span id="opponent-hp-current">0</span> / <span id="opponent-hp-max">0</span> HP</p>
        </div>
        
        <div class="grid-area">
           <div class="cell" id="e-cell-1"></div>
        </div> <!-- aqui va el pokemon oponente  -->
      </div>

      <!-- Fila del Jugador -->
      <div class="arena-row player-row">
        <div class="grid-area">
           <div class="cell" id="p-cell-1"></div>
           <div class="cell" id="p-cell-2"></div>
           <div class="cell" id="p-cell-3"></div>
        </div>

        <div class="stats-box player-stats" id="player-stats">
          <h2 id="player-name">--Nombre del Jugador--</h2>
          <div class="hp-bar-container">
            <div id="player-hp-bar" class="hp-fill hp-green"></div>
          </div>
          <p class="hp-text"><span id="player-hp-current">0</span> / <span id="player-hp-max">0</span> HP</p>
        </div>
      </div>
      
      <div class="enemy-status">
         <div id="warning-box" class="warning-box hidden">¡Ataque inminente!</div>
      </div>
    </div>

    <!-- Panel Inferior  -->
    <div class="battle-menu">
      <div class="log-panel" id="battle-log">
        <div id="log-content" class="log-content"></div>
      </div>
      
      <div class="controls-panel">
        <div class="cooldown-container">
           <span class="cooldown-label">Ataque Rápido</span>
           <div class="cooldown-wrapper">
             <div id="cooldown-fill" class="cooldown-fill-inner"></div>
           </div>
        </div>
        <button id="btn-definitive" class="btn-action">Definitivo!</button>
      </div>
    </div>
  </main>

  <!-- Modal de fin de partida -->

  <div id="end-screen" class="end-screen hidden">
    <div class="end-modal">
      <h2 id="end-title">¡Batalla Terminada!</h2>
      <p id="end-message"></p>
      <button id="btn-restart" class="btn-action">Battle Again</button>
    </div>
  </div>
</body>
</html>
